<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Generator</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #0f172a, #6366f1);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
            border: none;
            background: #6366f1;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #4f46e5;
        }

        .output {
            margin-top: 20px;
            font-weight: bold;
            word-wrap: break-word;
            color: #111827;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>🔐 Password Generator</h2>
    <p>Enter desired password length</p>

    <form method="POST">
        <input type="number" name="length" placeholder="Enter length (min 4)" required>
        <button>Generate</button>
    </form>

    <div class="output">{{ password }}</div>
</div>

</body>
</html>
